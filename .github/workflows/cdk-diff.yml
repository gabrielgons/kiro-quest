name: CDK Diff

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Bundle Lambda functions
        run: npm run build
        working-directory: backend

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/KiroQuestGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Run CDK diff
        id: diff
        run: |
          set +e
          DIFF_OUTPUT=$(npx cdk diff --all 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Write to file to preserve multiline output
          echo "$DIFF_OUTPUT" > /tmp/cdk-diff-output.txt

          # Also print to logs
          echo "$DIFF_OUTPUT"
        working-directory: infra

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffOutput = fs.readFileSync('/tmp/cdk-diff-output.txt', 'utf8');
            const exitCode = '${{ steps.diff.outputs.exit_code }}';

            let body = '## CDK Diff Results\n\n';

            if (exitCode === '0' && !diffOutput.includes('Stack')) {
              body += 'No infrastructure changes detected.\n';
            } else {
              body += '<details>\n<summary>Click to expand CDK diff output</summary>\n\n';
              body += '```\n' + diffOutput.substring(0, 60000) + '\n```\n\n';
              body += '</details>\n';
            }

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('## CDK Diff Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
