name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Kiro CLI
        # TODO: Pin to a specific version when a stable release is available (e.g. @anthropic-ai/kiro-cli@1.0.0)
        run: npm install -g @anthropic-ai/kiro-cli

      # TODO: Quando o power kiro-code-review for aprovado no registry da AWS,
      # substituir este step por: kiro power install kiro-code-review
      - name: Install kiro-code-review power
        # TODO: Pin to a specific commit or tag when available (e.g. git clone --branch v1.0.0 ...)
        run: git clone https://github.com/gabrielgons/kiro-code-review.git ~/.kiro/powers/kiro-code-review

      - name: Run Kiro Code Review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          kiro --no-interactive --trust-all-tools --require-mcp-startup \
            --prompt "Review the pull request #${{ github.event.pull_request.number }} in the repository ${{ github.repository }}. Use the kiro-code-review power to analyze the changes and post a native GitHub PR review with inline comments on the changed files."
