name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Kiro CLI
        run: |
          curl -fsSL https://cli.kiro.dev/install -o install-kiro.sh
          # TODO: Pin checksum when available
          # echo "<expected-sha256>  install-kiro.sh" | sha256sum --check
          bash install-kiro.sh

      # TODO: Quando o power kiro-code-review for aprovado no registry da AWS,
      # substituir este step por: kiro-cli power install kiro-code-review
      - name: Install kiro-code-review power
        run: git clone https://github.com/gabrielgons/kiro-code-review.git ~/.kiro/powers/kiro-code-review

      - name: Setup MCP configuration for headless mode
        run: |
          mkdir -p ~/.kiro/settings
          mkdir -p ~/.aws/amazonq
          cp .kiro/settings/mcp.json ~/.kiro/settings/mcp.json
          cp .kiro/settings/mcp.json ~/.aws/amazonq/mcp.json
          echo "MCP config copied to global paths:"
          cat ~/.kiro/settings/mcp.json

      - name: Verify MCP connectivity
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying MCP servers are accessible..."
          kiro-cli chat --no-interactive --trust-all-tools \
            "List your available MCP tools" || echo "Warning: MCP verification returned non-zero exit code"

      - name: Run Kiro Code Review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          kiro-cli chat --no-interactive --trust-all-tools --require-mcp-startup \
            "Review the pull request #${{ github.event.pull_request.number }} in the repository ${{ github.repository }}. Use the kiro-code-review power to analyze the changes and post a native GitHub PR review with inline comments on the changed files."
