name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Bundle Lambda functions
        run: npm run build
        working-directory: backend

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/KiroQuestGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stacks
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_ARN: ${{ secrets.GOOGLE_CLIENT_SECRET_ARN }}
        run: npx cdk deploy KiroQuestFrontendStack KiroQuestAuthStack KiroQuestBackendStack --require-approval never
        working-directory: infra
