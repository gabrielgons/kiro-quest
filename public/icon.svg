<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KiroQuest">
  <defs>
    <linearGradient id="kq-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#7c5cf0"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="kq-shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path
    d="M12 8 L52 8 Q56 8 56 12 L56 34 Q56 48 32 58 Q8 48 8 34 L8 12 Q8 8 12 8 Z"
